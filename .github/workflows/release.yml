name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v0.x.y tag to publish.
        required: true
        type: string
  push:
    tags:
      - 'v0.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Resolve release tag
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          if [[ ! "$tag" =~ ^v0\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be a v0.x.y tag such as v0.1.0; got '$tag'" >&2
            exit 1
          fi
          git fetch --tags --force
          if ! git rev-parse --verify --quiet "${tag}^{commit}" >/dev/null; then
            echo "Tag '$tag' does not exist in this repository" >&2
            exit 1
          fi
          git checkout --detach "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifacts and checksums.txt
        run: scripts/build-release-artifacts.sh --version "${{ steps.release.outputs.tag }}" --out-dir dist

      - name: Require Homebrew tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is required to update yersonargotev/homebrew-tap before publishing release assets" >&2
            exit 1
          fi

      - name: Check out Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: yersonargotev/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Generate Homebrew formula from release checksums
        run: |
          scripts/generate-homebrew-formula.sh \
            --version "${{ steps.release.outputs.tag }}" \
            --checksums dist/checksums.txt \
            --out homebrew-tap/Formula/packy.rb \
            --repo yersonargotev/packy \
            --homepage https://github.com/yersonargotev/packy \
            --desc "AI coding workflow installer"

      - name: Prepare Homebrew tap formula update
        id: prepare_tap
        working-directory: homebrew-tap
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch Formula/matty.rb
          git add Formula/packy.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already matches $RELEASE_TAG"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "feat: update packy formula to ${RELEASE_TAG}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Prove Homebrew tap push permission
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git push --dry-run origin HEAD:main

      - name: Create GitHub Release if needed
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber

      - name: Push prepared Homebrew tap formula update
        working-directory: homebrew-tap
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          TAP_UPDATE_CHANGED: ${{ steps.prepare_tap.outputs.changed }}
        run: |
          set -euo pipefail
          if [[ "$TAP_UPDATE_CHANGED" != "true" ]]; then
            echo "Homebrew formula already matches $RELEASE_TAG"
            exit 0
          fi
          git push origin HEAD:main
