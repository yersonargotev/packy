name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v0.x.y tag to publish.
        required: true
        type: string
  push:
    tags:
      - 'v0.*.*'

permissions: {}

jobs:
  build:
    name: Validate and build release candidate
    if: github.repository == 'yersonargotev/packy' && ((github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v0.')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      commit: ${{ steps.release.outputs.commit }}
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release tag
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          if [[ ! "$tag" =~ ^v0\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be a v0.x.y tag such as v0.1.0; got '$tag'" >&2
            exit 1
          fi
          git fetch --tags --force
          if ! git rev-parse --verify --quiet "${tag}^{commit}" >/dev/null; then
            echo "Tag '$tag' does not exist in this repository" >&2
            exit 1
          fi
          git checkout --detach "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate exact tag commit
        run: ./scripts/validate-packy.sh

      - name: Build release artifacts and checksums.txt
        run: scripts/build-release-artifacts.sh --version "${{ steps.release.outputs.tag }}" --out-dir dist

      - name: Retain proved release candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: packy-release-${{ steps.release.outputs.tag }}
          path: dist
          if-no-files-found: error

  claude-smoke:
    name: Claude ${{ matrix.claude }} smoke (${{ matrix.arch }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: amd64
            claude: 2.1.203
          - runner: macos-15-intel
            arch: amd64
            claude: stable
          - runner: macos-15
            arch: arm64
            claude: 2.1.203
          - runner: macos-15
            arch: arm64
            claude: stable
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          fetch-depth: 0
          ref: ${{ needs.build.outputs.commit }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Download proved release candidate
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: packy-release-${{ needs.build.outputs.tag }}
          path: ${{ runner.temp }}/dist

      - name: Restore executable mode
        run: chmod +x "$RUNNER_TEMP/dist/packy_${{ needs.build.outputs.tag }}_darwin_${{ matrix.arch }}"

      - name: Run release package smoke
        run: |
          ./scripts/run-claude-smoke.sh \
            --claude-version "${{ matrix.claude }}" \
            --packy-ref "${{ needs.build.outputs.commit }}" \
            --packy-binary "$RUNNER_TEMP/dist/packy_${{ needs.build.outputs.tag }}_darwin_${{ matrix.arch }}" \
            --evidence-dir "$RUNNER_TEMP/claude-release-evidence"

      - name: Retain release smoke evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: claude-release-${{ matrix.claude }}-darwin-${{ matrix.arch }}
          path: ${{ runner.temp }}/claude-release-evidence
          if-no-files-found: error

  validate-release-evidence:
    name: Validate complete release evidence
    needs: [build, claude-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out proved commit
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          fetch-depth: 0
          ref: ${{ needs.build.outputs.commit }}
          persist-credentials: false

      - name: Set up Go for evidence validation
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download proved release candidate
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: packy-release-${{ needs.build.outputs.tag }}
          path: dist

      - name: Download complete Claude smoke matrix
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: claude-release-*
          path: claude-evidence

      - name: Generate candidate Homebrew formula
        run: |
          mkdir -p release-metadata
          scripts/generate-homebrew-formula.sh \
            --version "${{ needs.build.outputs.tag }}" \
            --checksums dist/checksums.txt \
            --out release-metadata/packy.rb \
            --repo yersonargotev/packy \
            --homepage https://github.com/yersonargotev/packy \
            --desc "AI coding workflow installer"

      - name: Verify candidate parity and render release notes
        run: |
          scripts/verify-release-evidence.sh \
            --tag "${{ needs.build.outputs.tag }}" \
            --commit "${{ needs.build.outputs.commit }}" \
            --dist dist \
            --evidence-root claude-evidence \
            --formula release-metadata/packy.rb \
            --notes-template docs/release-notes/next.md \
            --notes-output release-metadata/release-notes.md

      - name: Retain proved publication metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: packy-release-metadata-${{ needs.build.outputs.tag }}
          path: release-metadata
          if-no-files-found: error

  release:
    name: Build and publish release artifacts
    needs: [build, validate-release-evidence]
    if: success() && github.repository == 'yersonargotev/packy' && ((github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v0.')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          fetch-depth: 0
          ref: ${{ needs.build.outputs.commit }}
          persist-credentials: false
      - name: Verify release tag remains bound
        id: release
        run: |
          set -euo pipefail
          tag="${{ needs.build.outputs.tag }}"
          candidate="${{ needs.build.outputs.commit }}"
          git fetch --tags --force
          current="$(git rev-parse "${tag}^{commit}")"
          if [[ "$current" != "$candidate" ]]; then
            echo "Release tag '$tag' moved after candidate validation: expected $candidate, got $current" >&2
            exit 1
          fi
          git checkout --detach "$candidate"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Go from proved commit
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download proved release artifacts and checksums.txt
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: packy-release-${{ steps.release.outputs.tag }}
          path: dist

      - name: Download proved formula and release notes
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: packy-release-metadata-${{ steps.release.outputs.tag }}
          path: release-metadata

      - name: Require Homebrew tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is required to update yersonargotev/homebrew-tap before publishing release assets" >&2
            exit 1
          fi

      - name: Check out Homebrew tap
        # This reviewed publication checkout persists only the tap-scoped token
        # required by the final dry-run and push to the dedicated tap repository.
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          repository: yersonargotev/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          persist-credentials: true

      - name: Install proved Homebrew formula candidate
        run: |
          mkdir -p homebrew-tap/Formula
          cp release-metadata/packy.rb homebrew-tap/Formula/packy.rb

      - name: Prepare Homebrew tap formula update
        id: prepare_tap
        working-directory: homebrew-tap
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch Formula/matty.rb
          git add Formula/packy.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already matches $RELEASE_TAG"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "feat: update packy formula to ${RELEASE_TAG}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Prove Homebrew tap push permission
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git push --dry-run origin HEAD:main

      - name: Reverify release tag before publication
        run: |
          set -euo pipefail
          git fetch --tags --force
          current="$(git rev-parse "${{ needs.build.outputs.tag }}^{commit}")"
          candidate="${{ needs.build.outputs.commit }}"
          if [[ "$current" != "$candidate" ]]; then
            echo "Release tag moved before publication: expected $candidate, got $current" >&2
            exit 1
          fi

      - name: Create GitHub Release if needed
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release view "$RELEASE_TAG" --json body --jq .body > "$RUNNER_TEMP/existing-release-notes.md"
            cmp release-metadata/release-notes.md "$RUNNER_TEMP/existing-release-notes.md"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file release-metadata/release-notes.md
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber

      - name: Push prepared Homebrew tap formula update
        working-directory: homebrew-tap
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          TAP_UPDATE_CHANGED: ${{ steps.prepare_tap.outputs.changed }}
        run: |
          set -euo pipefail
          if [[ "$TAP_UPDATE_CHANGED" != "true" ]]; then
            echo "Homebrew formula already matches $RELEASE_TAG"
            exit 0
          fi
          git push origin HEAD:main
