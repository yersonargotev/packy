name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate Packy-owned code
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate allowlisted Packy-owned code
        run: ./scripts/validate-packy.sh

      - name: Scan Packy-owned Go code for known vulnerabilities
        continue-on-error: true
        uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0
        with:
          go-version-file: go.mod
          go-package: ./...
          repo-checkout: false

  claude-floor-smoke:
    name: Claude 2.1.203 package smoke
    if: github.event_name == 'pull_request'
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run exact-floor package smoke
        run: |
          ./scripts/run-claude-smoke.sh \
            --claude-version 2.1.203 \
            --packy-ref "$GITHUB_SHA" \
            --evidence-dir "$RUNNER_TEMP/claude-floor-evidence"

      - name: Retain exact-floor evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-floor-${{ runner.os }}-${{ runner.arch }}
          path: ${{ runner.temp }}/claude-floor-evidence
          if-no-files-found: error
