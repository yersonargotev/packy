name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          languages: go
          build-mode: autobuild

      - name: Autobuild
        uses: github/codeql-action/autobuild@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2

      - name: Analyze
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check out repository history
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Resolve advisory comparison
        id: comparison
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == pull_request ]]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          else
            base="$(git rev-parse HEAD^)"
            head="$(git rev-parse HEAD)"
          fi
          echo "base=$base" >>"$GITHUB_OUTPUT"
          echo "head=$head" >>"$GITHUB_OUTPUT"

      - name: Review dependency changes in advisory mode
        continue-on-error: true
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          base-ref: ${{ steps.comparison.outputs.base }}
          head-ref: ${{ steps.comparison.outputs.head }}
          warn-only: true
