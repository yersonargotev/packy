name: Security

on:
  push:
    branches:
      - main
  schedule:
    - cron: '17 6 * * 1'

permissions: {}

jobs:
  codeql:
    name: CodeQL
    if: github.repository == 'yersonargotev/packy' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          languages: go
          build-mode: autobuild

      - name: Autobuild trusted main
        uses: github/codeql-action/autobuild@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2

      - name: Analyze
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
