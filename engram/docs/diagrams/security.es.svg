<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#cba6f7"/></marker>
  </defs>

  <rect width="1280" height="720" fill="#1e1e2e"/>

  <text x="640" y="90" text-anchor="middle" fill="#cdd6f4" font-size="48" font-weight="800">Defensa en Profundidad</text>
  <text x="640" y="125" text-anchor="middle" fill="#a6adc8" font-size="20">Memoria local primero. La nube es replicación opcional.</text>

  <g transform="translate(60,260)">
    <rect width="200" height="160" rx="14" fill="#fab38722" stroke="#fab387" stroke-width="2"/>
    <text x="100" y="40" text-anchor="middle" fill="#fab387" font-size="14" font-weight="700" letter-spacing="2">ETAPA 1</text>
    <text x="100" y="92" text-anchor="middle" fill="#cdd6f4" font-size="32" font-weight="700">Agente</text>
    <text x="100" y="124" text-anchor="middle" fill="#a6adc8" font-size="16">sin red</text>
  </g>

  <g transform="translate(290,260)">
    <rect width="200" height="160" rx="14" fill="#fab38722" stroke="#fab387" stroke-width="2"/>
    <text x="100" y="40" text-anchor="middle" fill="#fab387" font-size="14" font-weight="700" letter-spacing="2">ETAPA 2</text>
    <text x="100" y="92" text-anchor="middle" fill="#cdd6f4" font-size="32" font-weight="700">DB Local</text>
    <text x="100" y="124" text-anchor="middle" fill="#a6adc8" font-size="16">fuente de verdad</text>
  </g>

  <g transform="translate(520,260)">
    <rect width="200" height="160" rx="14" fill="#cba6f722" stroke="#cba6f7" stroke-width="2"/>
    <text x="100" y="40" text-anchor="middle" fill="#cba6f7" font-size="14" font-weight="700" letter-spacing="2">ETAPA 3</text>
    <text x="100" y="92" text-anchor="middle" fill="#cdd6f4" font-size="32" font-weight="700">Enrolamiento</text>
    <text x="100" y="124" text-anchor="middle" fill="#a6adc8" font-size="16">opt-in por proyecto</text>
  </g>

  <g transform="translate(750,260)">
    <rect width="200" height="160" rx="14" fill="#89b4fa22" stroke="#89b4fa" stroke-width="2"/>
    <text x="100" y="40" text-anchor="middle" fill="#89b4fa" font-size="14" font-weight="700" letter-spacing="2">ETAPA 4</text>
    <text x="100" y="92" text-anchor="middle" fill="#cdd6f4" font-size="32" font-weight="700">Red</text>
    <text x="100" y="124" text-anchor="middle" fill="#a6adc8" font-size="16">HTTPS + bearer</text>
  </g>

  <g transform="translate(980,260)">
    <rect width="200" height="160" rx="14" fill="#94e2d522" stroke="#94e2d5" stroke-width="2"/>
    <text x="100" y="40" text-anchor="middle" fill="#94e2d5" font-size="14" font-weight="700" letter-spacing="2">ETAPA 5</text>
    <text x="100" y="92" text-anchor="middle" fill="#cdd6f4" font-size="32" font-weight="700">Nube</text>
    <text x="100" y="124" text-anchor="middle" fill="#a6adc8" font-size="16">allowlist + Postgres</text>
  </g>

  <line x1="262" y1="340" x2="288" y2="340" stroke="#cba6f7" stroke-width="3" marker-end="url(#ar)"/>
  <line x1="492" y1="340" x2="518" y2="340" stroke="#cba6f7" stroke-width="3" marker-end="url(#ar)"/>
  <line x1="722" y1="340" x2="748" y2="340" stroke="#cba6f7" stroke-width="3" marker-end="url(#ar)"/>
  <line x1="952" y1="340" x2="978" y2="340" stroke="#cba6f7" stroke-width="3" marker-end="url(#ar)"/>

  <g transform="translate(640,560)">
    <text x="0" y="0" text-anchor="middle" fill="#f38ba8" font-size="20" font-weight="700" letter-spacing="3">CADA PUERTA FALLA CERRADA</text>
    <text x="0" y="32" text-anchor="middle" fill="#a6adc8" font-size="16">auth desconocida → se rechaza por defecto</text>
  </g>
