<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#89b4fa"/></marker>
    <marker id="ar-mauve" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#cba6f7"/></marker>
  </defs>

  <rect width="1280" height="720" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="640" y="90" text-anchor="middle" fill="#cdd6f4" font-size="48" font-weight="800">Two Auth Paths</text>
  <text x="640" y="125" text-anchor="middle" fill="#a6adc8" font-size="20">Machines speak bearer. Humans speak signed cookies.</text>

  <!-- Column A: Machine -->
  <g transform="translate(80,180)">
    <rect width="540" height="500" rx="16" fill="#89b4fa12" stroke="#89b4fa" stroke-width="2"/>
    <text x="270" y="50" text-anchor="middle" fill="#89b4fa" font-size="14" font-weight="700" letter-spacing="4">MACHINE</text>
    <text x="270" y="90" text-anchor="middle" fill="#cdd6f4" font-size="28" font-weight="700">Bearer Token</text>

    <!-- step 1 -->
    <g transform="translate(60,140)">
      <circle cx="22" cy="22" r="22" fill="#89b4fa"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">1</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">Send Authorization header</text>
      <text x="60" y="42" fill="#a6adc8" font-size="14">on every HTTPS request</text>
    </g>
    <!-- step 2 -->
    <g transform="translate(60,225)">
      <circle cx="22" cy="22" r="22" fill="#89b4fa"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">2</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">Server matches the token</text>
      <text x="60" y="42" fill="#a6adc8" font-size="14">configured via env var</text>
    </g>
    <!-- step 3 -->
    <g transform="translate(60,310)">
      <circle cx="22" cy="22" r="22" fill="#89b4fa"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">3</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">Server checks the project</text>
      <text x="60" y="42" fill="#a6adc8" font-size="14">must be on the allowlist</text>
    </g>
    <!-- step 4 -->
    <g transform="translate(60,395)">
      <circle cx="22" cy="22" r="22" fill="#a6e3a1"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">4</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">Request goes through</text>
      <text x="60" y="42" fill="#a6e3a1" font-size="14" font-weight="600">200 OK</text>
    </g>
  </g>

  <!-- Column B: Human -->
  <g transform="translate(660,180)">
    <rect width="540" height="500" rx="16" fill="#cba6f712" stroke="#cba6f7" stroke-width="2"/>
    <text x="270" y="50" text-anchor="middle" fill="#cba6f7" font-size="14" font-weight="700" letter-spacing="4">HUMAN</text>
    <text x="270" y="90" text-anchor="middle" fill="#cdd6f4" font-size="28" font-weight="700">Session Cookie</text>

    <!-- step 1 -->
    <g transform="translate(60,140)">
      <circle cx="22" cy="22" r="22" fill="#cba6f7"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">1</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">User logs in with token</text>
      <text x="60" y="42" fill="#a6adc8" font-size="14">one-time on the dashboard</text>
    </g>
    <!-- step 2 -->
    <g transform="translate(60,225)">
      <circle cx="22" cy="22" r="22" fill="#cba6f7"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">2</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">Server signs a cookie</text>
      <text x="60" y="42" fill="#a6adc8" font-size="14">HMAC-SHA256, valid 8h</text>
    </g>
    <!-- step 3 -->
    <g transform="translate(60,310)">
      <circle cx="22" cy="22" r="22" fill="#cba6f7"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">3</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">Browser sends cookie</text>
      <text x="60" y="42" fill="#a6adc8" font-size="14">on every page load</text>
    </g>
    <!-- step 4 -->
    <g transform="translate(60,395)">
      <circle cx="22" cy="22" r="22" fill="#a6e3a1"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">4</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">Server verifies signature</text>
      <text x="60" y="42" fill="#a6e3a1" font-size="14" font-weight="600">page renders</text>
    </g>
  </g>
</svg>
