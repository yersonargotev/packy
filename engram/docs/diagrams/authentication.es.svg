<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#89b4fa"/></marker>
    <marker id="ar-mauve" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#cba6f7"/></marker>
  </defs>

  <rect width="1280" height="720" fill="#1e1e2e"/>

  <text x="640" y="90" text-anchor="middle" fill="#cdd6f4" font-size="48" font-weight="800">Dos Caminos de Auth</text>
  <text x="640" y="125" text-anchor="middle" fill="#a6adc8" font-size="20">Las máquinas hablan bearer. Los humanos cookies firmadas.</text>

  <g transform="translate(80,180)">
    <rect width="540" height="500" rx="16" fill="#89b4fa12" stroke="#89b4fa" stroke-width="2"/>
    <text x="270" y="50" text-anchor="middle" fill="#89b4fa" font-size="14" font-weight="700" letter-spacing="4">MÁQUINA</text>
    <text x="270" y="90" text-anchor="middle" fill="#cdd6f4" font-size="28" font-weight="700">Bearer Token</text>

    <g transform="translate(60,140)">
      <circle cx="22" cy="22" r="22" fill="#89b4fa"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">1</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">Manda el header Authorization</text>
      <text x="60" y="42" fill="#a6adc8" font-size="14">en cada request HTTPS</text>
    </g>
    <g transform="translate(60,225)">
      <circle cx="22" cy="22" r="22" fill="#89b4fa"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">2</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">Servidor matchea el token</text>
      <text x="60" y="42" fill="#a6adc8" font-size="14">configurado por env var</text>
    </g>
    <g transform="translate(60,310)">
      <circle cx="22" cy="22" r="22" fill="#89b4fa"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">3</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">Servidor chequea el proyecto</text>
      <text x="60" y="42" fill="#a6adc8" font-size="14">tiene que estar en la allowlist</text>
    </g>
    <g transform="translate(60,395)">
      <circle cx="22" cy="22" r="22" fill="#a6e3a1"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">4</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">El request pasa</text>
      <text x="60" y="42" fill="#a6e3a1" font-size="14" font-weight="600">200 OK</text>
    </g>
  </g>

  <g transform="translate(660,180)">
    <rect width="540" height="500" rx="16" fill="#cba6f712" stroke="#cba6f7" stroke-width="2"/>
    <text x="270" y="50" text-anchor="middle" fill="#cba6f7" font-size="14" font-weight="700" letter-spacing="4">HUMANO</text>
    <text x="270" y="90" text-anchor="middle" fill="#cdd6f4" font-size="28" font-weight="700">Cookie de Sesión</text>

    <g transform="translate(60,140)">
      <circle cx="22" cy="22" r="22" fill="#cba6f7"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">1</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">Usuario hace login con token</text>
      <text x="60" y="42" fill="#a6adc8" font-size="14">una vez en el dashboard</text>
    </g>
    <g transform="translate(60,225)">
      <circle cx="22" cy="22" r="22" fill="#cba6f7"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">2</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">Servidor firma una cookie</text>
      <text x="60" y="42" fill="#a6adc8" font-size="14">HMAC-SHA256, válida 8h</text>
    </g>
    <g transform="translate(60,310)">
      <circle cx="22" cy="22" r="22" fill="#cba6f7"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">3</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">Browser manda la cookie</text>
      <text x="60" y="42" fill="#a6adc8" font-size="14">en cada page load</text>
    </g>
    <g transform="translate(60,395)">
      <circle cx="22" cy="22" r="22" fill="#a6e3a1"/>
      <text x="22" y="29" text-anchor="middle" fill="#1e1e2e" font-size="20" font-weight="800">4</text>
      <text x="60" y="20" fill="#cdd6f4" font-size="20" font-weight="700">Servidor verifica la firma</text>
      <text x="60" y="42" fill="#a6e3a1" font-size="14" font-weight="600">renderea la página</text>
    </g>
  </g>
</svg>
