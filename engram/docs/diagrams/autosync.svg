<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="ar-gr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#a6e3a1"/></marker>
    <marker id="ar-y"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#f9e2af"/></marker>
    <marker id="ar-p"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#fab387"/></marker>
    <marker id="ar-bl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#89b4fa"/></marker>
  </defs>

  <rect width="1280" height="720" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="640" y="90" text-anchor="middle" fill="#cdd6f4" font-size="48" font-weight="800">Autosync Lifecycle</text>
  <text x="640" y="125" text-anchor="middle" fill="#a6adc8" font-size="20">Idle → Run → (Healthy or Degraded) → back to Idle.</text>

  <!-- IDLE -->
  <g transform="translate(120,330)">
    <rect width="200" height="120" rx="14" fill="#45475a" stroke="#89b4fa" stroke-width="3"/>
    <text x="100" y="56" text-anchor="middle" fill="#89b4fa" font-size="14" font-weight="700" letter-spacing="3">WAITING</text>
    <text x="100" y="92" text-anchor="middle" fill="#cdd6f4" font-size="32" font-weight="700">Idle</text>
  </g>

  <!-- RUNNING -->
  <g transform="translate(540,330)">
    <rect width="200" height="120" rx="14" fill="#89b4fa22" stroke="#89b4fa" stroke-width="3"/>
    <text x="100" y="56" text-anchor="middle" fill="#89b4fa" font-size="14" font-weight="700" letter-spacing="3">CYCLE IN FLIGHT</text>
    <text x="100" y="92" text-anchor="middle" fill="#cdd6f4" font-size="32" font-weight="700">Running</text>
  </g>

  <!-- HEALTHY -->
  <g transform="translate(960,210)">
    <rect width="200" height="120" rx="14" fill="#a6e3a122" stroke="#a6e3a1" stroke-width="3"/>
    <text x="100" y="56" text-anchor="middle" fill="#a6e3a1" font-size="14" font-weight="700" letter-spacing="3">SUCCESS</text>
    <text x="100" y="92" text-anchor="middle" fill="#cdd6f4" font-size="32" font-weight="700">Healthy</text>
  </g>

  <!-- DEGRADED -->
  <g transform="translate(960,450)">
    <rect width="200" height="120" rx="14" fill="#f9e2af22" stroke="#f9e2af" stroke-width="3"/>
    <text x="100" y="56" text-anchor="middle" fill="#f9e2af" font-size="14" font-weight="700" letter-spacing="3">FAILURE</text>
    <text x="100" y="92" text-anchor="middle" fill="#cdd6f4" font-size="32" font-weight="700">Degraded</text>
  </g>

  <!-- Idle → Running -->
  <line x1="320" y1="390" x2="538" y2="390" stroke="#89b4fa" stroke-width="3" marker-end="url(#ar-bl)"/>
  <text x="429" y="375" text-anchor="middle" fill="#89b4fa" font-size="16" font-weight="600">tick</text>
  <text x="429" y="410" text-anchor="middle" fill="#a6adc8" font-size="13">every 30s</text>

  <!-- Running → Healthy -->
  <line x1="660" y1="335" x2="958" y2="270" stroke="#a6e3a1" stroke-width="3" marker-end="url(#ar-gr)"/>
  <text x="800" y="280" text-anchor="middle" fill="#a6e3a1" font-size="16" font-weight="600">ok</text>

  <!-- Running → Degraded -->
  <line x1="660" y1="445" x2="958" y2="510" stroke="#f9e2af" stroke-width="3" marker-end="url(#ar-y)"/>
  <text x="800" y="500" text-anchor="middle" fill="#f9e2af" font-size="16" font-weight="600">error</text>

  <!-- Healthy → Idle (loopback) -->
  <path d="M 1060 215 C 1080 130, 600 100, 220 320" stroke="#a6e3a1" stroke-width="3" fill="none" marker-end="url(#ar-gr)"/>

  <!-- Degraded → Idle (after backoff) -->
  <path d="M 1060 575 C 1080 660, 600 660, 220 460" stroke="#fab387" stroke-width="3" fill="none" marker-end="url(#ar-p)"/>
  <text x="640" y="660" text-anchor="middle" fill="#fab387" font-size="16" font-weight="600">backoff up to 5 min</text>

  <!-- Inner cycle hint -->
  <text x="640" y="180" text-anchor="middle" fill="#cba6f7" font-size="18" font-weight="700" letter-spacing="2">PUSH PENDING · PULL NEW · RECORD</text>
</svg>
