<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="ar-mauve" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#cba6f7"/></marker>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#89b4fa"/></marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#a6e3a1"/></marker>
  </defs>

  <rect width="1280" height="720" fill="#1e1e2e"/>

  <text x="640" y="90" text-anchor="middle" fill="#cdd6f4" font-size="48" font-weight="800">Cómo Se Comunica</text>
  <text x="640" y="125" text-anchor="middle" fill="#a6adc8" font-size="20">Tres superficies, un binario en el medio.</text>

  <g transform="translate(60,250)">
    <rect width="280" height="200" rx="16" fill="#f2cdcd22" stroke="#f2cdcd" stroke-width="2"/>
    <text x="140" y="46" text-anchor="middle" fill="#f2cdcd" font-size="14" font-weight="700" letter-spacing="3">CLIENTES</text>
    <text x="140" y="105" text-anchor="middle" fill="#cdd6f4" font-size="32" font-weight="700">Agentes</text>
    <text x="140" y="142" text-anchor="middle" fill="#a6adc8" font-size="16">Claude · OpenCode</text>
    <text x="140" y="166" text-anchor="middle" fill="#a6adc8" font-size="16">Cursor · Codex …</text>
  </g>

  <g transform="translate(500,250)">
    <rect width="280" height="200" rx="16" fill="#fab38722" stroke="#fab387" stroke-width="2"/>
    <text x="140" y="46" text-anchor="middle" fill="#fab387" font-size="14" font-weight="700" letter-spacing="3">LOCAL</text>
    <text x="140" y="105" text-anchor="middle" fill="#cdd6f4" font-size="32" font-weight="700">Engram</text>
    <text x="140" y="142" text-anchor="middle" fill="#a6adc8" font-size="16">binario Go único</text>
    <text x="140" y="166" text-anchor="middle" fill="#a6adc8" font-size="16">en tu máquina</text>
  </g>

  <g transform="translate(940,250)">
    <rect width="280" height="200" rx="16" fill="#94e2d522" stroke="#94e2d5" stroke-width="2"/>
    <text x="140" y="46" text-anchor="middle" fill="#94e2d5" font-size="14" font-weight="700" letter-spacing="3">REMOTO · OPCIONAL</text>
    <text x="140" y="105" text-anchor="middle" fill="#cdd6f4" font-size="32" font-weight="700">Nube</text>
    <text x="140" y="142" text-anchor="middle" fill="#a6adc8" font-size="16">réplica + dashboard</text>
    <text x="140" y="166" text-anchor="middle" fill="#a6adc8" font-size="16">en tu VPS</text>
  </g>

  <line x1="342" y1="350" x2="498" y2="350" stroke="#cba6f7" stroke-width="3" marker-end="url(#ar-mauve)"/>
  <text x="420" y="335" text-anchor="middle" fill="#cba6f7" font-size="16" font-weight="600">MCP stdio</text>

  <line x1="782" y1="350" x2="938" y2="350" stroke="#89b4fa" stroke-width="3" marker-end="url(#ar-blue)"/>
  <text x="860" y="335" text-anchor="middle" fill="#89b4fa" font-size="16" font-weight="600">HTTPS + bearer</text>

  <g transform="translate(500,520)">
    <rect width="280" height="100" rx="14" fill="#a6e3a122" stroke="#a6e3a1" stroke-width="2"/>
    <text x="140" y="42" text-anchor="middle" fill="#a6e3a1" font-size="14" font-weight="700" letter-spacing="3">FUENTE DE VERDAD</text>
    <text x="140" y="76" text-anchor="middle" fill="#cdd6f4" font-size="22" font-weight="700">SQLite ~/.engram</text>
  </g>
  <line x1="640" y1="450" x2="640" y2="518" stroke="#a6e3a1" stroke-width="3" marker-end="url(#ar-green)"/>

  <g transform="translate(940,520)">
    <rect width="280" height="100" rx="14" fill="#a6e3a122" stroke="#a6e3a1" stroke-width="2"/>
    <text x="140" y="42" text-anchor="middle" fill="#a6e3a1" font-size="14" font-weight="700" letter-spacing="3">LOG DE RÉPLICA</text>
    <text x="140" y="76" text-anchor="middle" fill="#cdd6f4" font-size="22" font-weight="700">Postgres</text>
  </g>
  <line x1="1080" y1="450" x2="1080" y2="518" stroke="#a6e3a1" stroke-width="3" marker-end="url(#ar-green)"/>
</svg>
