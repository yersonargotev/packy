version: 2

updates:
  # Go module dependencies
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "type:chore"
    commit-message:
      prefix: "chore(deps)"
    reviewers:
      - "Gentleman-Programming"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "type:chore"
    commit-message:
      prefix: "chore(ci)"
    reviewers:
      - "Gentleman-Programming"
